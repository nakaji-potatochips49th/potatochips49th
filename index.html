<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>新歓予約フォーム一覧</title>
    <style>
        body {
            /* 指定された画像を背景に設定 */
            background-image: url("screenshot wave.png");
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            margin: 0;
            padding: 40px 10px;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        }

        /* 1. PotatoChips2026（最上部タイトル） */
        .top-brand-title {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
            text-align: center;
            margin: 20px 0 10px 0;
            width: 100%;
        }

        /* ヘッダーセクションの基本設定 */
        .header-section {
            text-align: center;
            color: white;
            max-width: 800px;
            margin: 0 auto; /* 下の余白はSNSリンク側で調整 */
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            border-bottom: 3px solid #333; /* 写真のようにタイトルの下に線を入れる場合 */
            display: inline-block;
            padding-bottom: 5px;
        }

        /* 2. 説明文部分 */
        .header-section p {
            /* 写真のように背景を透過させる場合（不要なら削除してください） */
            /* background: rgba(0, 0, 0, 0.2); */
            padding: 20px;
            border-radius: 15px;
            line-height: 1.8;
            font-size: 16px;
            text-align: center;
            margin: 0 auto 20px auto;
            font-weight: bold;
        }

        /* 3. SNSアイコンエリア（説明文のすぐ下に配置） */
        .sns-links {
            text-align: center;
            margin-bottom: 40px;
        }

        .sns-links a {
            text-decoration: none;
            margin: 0 8px;
            display: inline-block;
        }

        .sns-links img {
            width: 45px; 
            height: 45px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s ease-in-out;
        }

        .sns-links img:hover {
            transform: scale(1.1);
        }

        /* --- 以下、カードレイアウトのスタイル --- */
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            text-align: center;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .date-text {
            background-color: #f8f8f8;
            padding: 10px;
            font-size: 16px;
            color: #444;
            font-weight: bold;
            border-bottom: 1px solid #eee;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .info h3 {
            margin: 0 0 10px 0;
            font-size: 20px;
            color: #333;
            border-bottom: 2px solid #333;
            display: inline-block;
            align-self: center;
        }

        .info p {
            font-size: 14px;
            color: #444;
            line-height: 1.6;
            margin-bottom: 20px;
            text-align: left;
            flex-grow: 1;
        }

        .btn-entry {
            display: inline-block;
            background: #ff4b2b; /* 単色、またはグラデーション */
            background: linear-gradient(to right, #ff4b2b, #ff416c);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: opacity 0.3s;
            width: fit-content;
            margin: 0 auto;
        }

        .btn-entry:hover {
            opacity: 0.8;
        }

        /* レスポンシブ対応 */
        @media (max-width: 900px) {
            .container { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .container { grid-template-columns: 1fr; }
            h1 { font-size: 28px; }
            .top-brand-title { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="top-brand-title">PotatoChips2026</div>

    <div class="header-section">
        <h1>新歓予約フォーム一覧</h1>
        
        <p>
            参加したい企画に申し込みをしてね！<br>
            まだ公式ラインを追加していない人は申し込み前に追加してください！<br>
            応募締め切りは各企画の前日までです。<br>
            飛び込みで参加したい人は公式ラインまたは代持ちの誰かに聞いてみてください。
        </p>
    </div>

    <div class="sns-links">
        <a href="https://x.com/potatochips49th?s=11" target="_blank">
            <img src="x.png" alt="X">
        </a>
        <a href="https://www.instagram.com/potatochips_49th?igsh=eWlma2FvaGxmdng4" target="_blank">
            <img src="instagram.png" alt="Instagram">
        </a>
        <a href="https://lin.ee/op4LQtgR" target="_blank">
            <img src="line.png" alt="LINE">
        </a>
    </div>

    <div class="container">
        <div class="card">
            <div class="date-text">4/3 履修相談会 13:00~15:00</div>
            <img src="risyu.png" alt="履修相談会">
            <div class="info">
                <h3>履修相談会</h3>
                <p>履修って意外とややこしい⁉ 先輩からアドバイスをもらいながら一緒に履修を組もう📝</p>
                <a href="#" class="btn-entry">申し込み</a>
            </div>
        </div>

        <div class="card">
            <div class="date-text">4/7 ボウリング</div>
            <img src="bowling.png" alt="ボウリング">
            <div class="info">
                <h3>ボウリング</h3>
                <p>参加費:500円<br>班に分かれてチーム戦をするよ！🎳 上手い下手は二の次で、とにかく盛り上がる！</p>
                <a href="#" class="btn-entry">申し込み</a>
            </div>
        </div>

        </div>

</body>
</html>
