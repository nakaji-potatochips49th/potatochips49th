<!DOCTYPE html>

    <style>
        /* ここにデザインの命令を書きます */
        body {
            background-image: url("image_3071c0.jpg");
            background-size: cover;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
        }
        h1 {
            color: white;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            width: 180px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .card img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }
        .date {
            font-size: 12px;
            color: #666;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        .btn-entry {
            display: inline-block;
            background-color: #ff4b2b;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 12px;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn-entry:hover {
            background-color: #ff416c;
            opacity: 0.8;
        }
    </style>
</head>
